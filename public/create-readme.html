<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Nguyễn Hồng Diễm Phúc</title>
  <link rel="icon" href="/images/logo.ico" type="image/x-icon">
  <meta name="description" content="Profile Nguyễn Hồng Diễm Phúc - Github">
  <meta name="author" content="Nguyễn Hồng Diễm Phúc">

  <!-- SEO -->
  <meta property="og:title" content="Profile Nguyễn Hồng Diễm Phúc">
  <meta property="og:description" content="Profile Nguyễn Hồng Diễm Phúc - GitHub.">
  <meta property="og:image" content="images/avatar.webp">
  <meta property="og:url" content="https://nguyenhongdiemphucvn.github.io">
  <meta name="theme-color" content="#2196f3">
  <link rel="manifest" href="/manifest.json">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background-color: #111827; color: #ffffff; }
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      color: white;
      animation: fade 0.3s ease-in-out;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/public/service-worker.js')
        .then(() => console.log('Service Worker đã đăng ký'))
        .catch(err => console.error('Đăng ký Service Worker thất bại:', err));
    }
  </script>
</head>
<body class="font-sans min-h-screen p-4 sm:p-6 lg:p-8">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-3xl sm:text-4xl font-bold text-center mb-6">Tạo README.md với Thống kê GitHub</h1>

    <div class="bg-gray-800 p-4 rounded mb-6">
      <label class="block mb-2 text-sm font-medium text-gray-300">Nhập tên người dùng GitHub:</label>
      <input type="text" id="githubUsername" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="Tên GitHub">
      <button onclick="layThongKeGitHub()" class="mt-3 w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">Lấy thống kê</button>
    </div>

    <div id="stats" class="bg-gray-800 p-4 rounded mb-6 hidden">
      <h3 class="text-lg font-semibold">Thống kê GitHub</h3>
      <ul id="statsList" class="text-gray-400"></ul>
      <canvas id="languageChart" width="400" height="200"></canvas>
    </div>

    <div class="bg-gray-800 p-4 rounded mb-6">
      <label class="block mb-2 text-sm font-medium text-gray-300">Tên dự án:</label>
      <input type="text" id="title" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="Tên dự án">

      <label class="block mb-2 text-sm font-medium text-gray-300">Mô tả:</label>
      <textarea id="description" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="Mô tả dự án"></textarea>

      <label class="block mb-2 text-sm font-medium text-gray-300">Hướng dẫn cài đặt:</label>
      <textarea id="installation" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="Lệnh cài đặt"></textarea>
      <button onclick="saoChepNoiDung('installation')" class="mt-2 bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm">Sao chép cài đặt</button>

      <label class="block mb-2 text-sm font-medium text-gray-300">Cách sử dụng:</label>
      <textarea id="usage" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="Lệnh sử dụng"></textarea>
      <button onclick="saoChepNoiDung('usage')" class="mt-2 bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm">Sao chép sử dụng</button>

      <button onclick="taoReadme()" class="mt-3 w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm">Tạo README.md</button>
    </div>

    <div id="readmePreview" class="bg-gray-800 p-4 rounded mb-6 hidden">
      <h3 class="text-lg font-semibold mb-2">Xem trước README.md</h3>
      <pre id="readmeContent" class="bg-gray-700 p-4 rounded text-gray-300"></pre>
      <button onclick="taiVeReadme()" class="mt-3 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Tải README.md</button>
    </div>
  </div>

  <script>
    let thongKeGitHub = {
      sao: 0,
      nhanh: 0,
      kho: 0,
      ngonNgu: {}
    };

    function luuVaoBoNhoTrinhDuyet() {
      localStorage.setItem('readmeTieuDe', document.getElementById('title').value);
      localStorage.setItem('readmeMoTa', document.getElementById('description').value);
      localStorage.setItem('readmeCaiDat', document.getElementById('installation').value);
      localStorage.setItem('readmeSuDung', document.getElementById('usage').value);
    }

    function taiTuBoNhoTrinhDuyet() {
      document.getElementById('title').value = localStorage.getItem('readmeTieuDe') || '';
      document.getElementById('description').value = localStorage.getItem('readmeMoTa') || '';
      document.getElementById('installation').value = localStorage.getItem('readmeCaiDat') || '';
      document.getElementById('usage').value = localStorage.getItem('readmeSuDung') || '';
    }

    window.onload = taiTuBoNhoTrinhDuyet;

    async function layThongKeGitHub() {
      const tenNguoiDung = document.getElementById('githubUsername').value;
      if (!tenNguoiDung) return alert('Vui lòng nhập tên GitHub.');

      const duongDanAPI = `https://api.github.com/users/${tenNguoiDung}/repos?per_page=100`;

      try {
        const phanHoi = await fetch(duongDanAPI);
        const danhSachRepo = await phanHoi.json();

        if (phanHoi.status !== 200) throw new Error('Không thể lấy dữ liệu.');

        thongKeGitHub = { sao: 0, nhanh: 0, kho: danhSachRepo.length, ngonNgu: {} };

        danhSachRepo.forEach(repo => {
          thongKeGitHub.sao += repo.stargazers_count;
          thongKeGitHub.nhanh += repo.forks_count;
          if (repo.language) {
            thongKeGitHub.ngonNgu[repo.language] = (thongKeGitHub.ngonNgu[repo.language] || 0) + 1;
          }
        });

        document.getElementById('stats').classList.remove('hidden');
        document.getElementById('statsList').innerHTML = `
          <li><strong>Tổng sao:</strong> ${thongKeGitHub.sao}</li>
          <li><strong>Tổng fork:</strong> ${thongKeGitHub.nhanh}</li>
          <li><strong>Repository:</strong> ${thongKeGitHub.kho}</li>
          <li><strong>Ngôn ngữ:</strong> ${Object.keys(thongKeGitHub.ngonNgu).join(', ')}</li>
        `;

        veBieuDoNgonNgu(thongKeGitHub.ngonNgu);
      } catch (err) {
        console.error(err);
        alert('Có lỗi khi lấy dữ liệu từ GitHub.');
      }
    }

    function veBieuDoNgonNgu(ngonNgu) {
      const ctx = document.getElementById('languageChart').getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: Object.keys(ngonNgu),
          datasets: [{
            label: 'Ngôn ngữ',
            data: Object.values(ngonNgu),
            backgroundColor: 'rgba(34, 197, 94, 0.5)',
            borderColor: 'rgba(34, 197, 94, 1)',
            borderWidth: 1
          }]
        },
        options: { responsive: true }
      });
    }

    function saoChepNoiDung(id) {
      const noiDung = document.getElementById(id).value;
      navigator.clipboard.writeText(noiDung).then(() => {
        const thongBao = document.createElement('div');
        thongBao.className = 'toast';
        thongBao.innerText = 'Đã sao chép!';
        document.body.appendChild(thongBao);
        setTimeout(() => thongBao.remove(), 2000);
      });
    }

    function taoReadme() {
      const tieuDe = document.getElementById('title').value;
      const moTa = document.getElementById('description').value;
      const caiDat = document.getElementById('installation').value;
      const suDung = document.getElementById('usage').value;

      const readme = `
# ${tieuDe}

## Mô tả
${moTa}

## Cài đặt
\`\`\`bash
${caiDat}
\`\`\`

## Sử dụng
\`\`\`bash
${suDung}
\`\`\`

## Thống kê GitHub
- **Sao**: ${thongKeGitHub.sao}
- **Fork**: ${thongKeGitHub.nhanh}
- **Repository**: ${thongKeGitHub.kho}
- **Ngôn ngữ**: ${Object.keys(thongKeGitHub.ngonNgu).join(', ') || 'Không có'}

## Giấy phép
Dự án này sử dụng MIT License.
      `;

      document.getElementById('readmeContent').textContent = readme;
      document.getElementById('readmePreview').classList.remove('hidden');
      luuVaoBoNhoTrinhDuyet();
    }

    function taiVeReadme() {
      const noiDung = document.getElementById('readmeContent').textContent;
      const blob = new Blob([noiDung], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'README.md';
      a.click();
    }
  </script>
</body>
</html>
