<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Nguyễn Hồng Diễm Phúc</title>
  <link rel="icon" href="/images/logo.ico" type="image/x-icon">
  <meta name="description" content="Profile Nguyễn Hồng Diễm Phúc - Github">
  <meta name="author" content="Nguyễn Hồng Diễm Phúc">

  <!-- SEO -->
  <meta property="og:title" content="Profile Nguyễn Hồng Diễm Phúc">
  <meta property="og:description" content="Profile Nguyễn Hồng Diễm Phúc - GitHub.">
  <meta property="og:image" content="images/avatar.webp">
  <meta property="og:url" content="https://nguyenhongdiemphucvn.github.io">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196f3">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: white;
    }

    .container {
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    #editor {
      height: 60vh;
      border: 1px solid #333;
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input, button, select {
      padding: 0.5rem;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      font-size: 16px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin-top: 20px;
      border-radius: 5px;
      max-width: 100%;
    }

    #status.success {
      background-color: lightgreen;
      color: green;
    }

    #status.error {
      background-color: #f8d7da;
      color: #721c24;
    }

    #preview {
      margin-top: 20px;
      display: none;
      border: 1px solid #444;
      background: #fff;
      color: #000;
      padding: 1rem;
    }

    #htmlPreview {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
    }

    #mdPreview {
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
    }

    #fontSizeSelect {
      padding: 5px;
      margin-top: 10px;
      font-size: 14px;
      color: #fff;
      background-color: #333;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/public/service-worker.js')
        .then(() => console.log('Service Worker đã được đăng ký'))
        .catch(err => console.error('Đăng ký Service Worker thất bại:', err));
    }
  </script>
</head>
<body>
  <div class="container">
    <h2>Trình Soạn Thảo Code & Tải Lên GitHub</h2>

    <div class="controls">
      <button onclick="fetchFileFromGitHub()">Lấy từ GitHub</button>
      <button onclick="uploadEditorCode()">Tải lên GitHub</button>
      <button onclick="editor.getAction('actions.find').run()">Tìm/Thay thế</button>
      <button onclick="downloadFile()">Tải xuống tệp</button>
      <button onclick="previewCode()">Xem trước</button>
      <input type="file" id="localFile" onchange="handleFileSelect(event)" />
      <label for="localFile">Hoặc chọn tệp từ máy</label>

      <label>Giao diện:</label>
      <select onchange="changeTheme(this.value)">
        <option value="vs-dark">Tối</option>
        <option value="vs">Sáng</option>
        <option value="hc-black">Tương phản cao</option>
      </select>

      <label>Cỡ chữ:</label>
      <select id="fontSizeSelect" onchange="changeFontSize(this.value)"></select>
    </div>

    <div id="editor">// Viết mã tại đây...</div>
    <div id="status"></div>

    <div id="preview">
      <h3>Xem trước</h3>
      <iframe id="htmlPreview" style="display: none;"></iframe>
      <div id="mdPreview" style="display: none;"></div>
    </div>
  </div>

  <script>
    let editor;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
    require(["vs/editor/editor.main"], function () {
      editor = monaco.editor.create(document.getElementById("editor"), {
        value: "// Viết mã tại đây...",
        language: "plaintext",
        theme: "vs-dark",
        automaticLayout: true,
        fontSize: 14
      });

      monaco.languages.registerCompletionItemProvider('javascript', {
        provideCompletionItems: () => ({
          suggestions: [{
            label: 'console.log',
            kind: monaco.languages.CompletionItemKind.Snippet,
            insertText: 'console.log($1);',
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            documentation: 'Xuất dữ liệu ra bảng điều khiển'
          }]
        })
      });

      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
        uploadEditorCode();
      });

      monaco.editor.setModelMarkers(editor.getModel(), 'owner', [{
        startLineNumber: 1,
        startColumn: 1,
        endLineNumber: 1,
        endColumn: 10,
        message: "Cảnh báo mẫu: thay thế dòng này",
        severity: monaco.MarkerSeverity.Warning
      }]);
    });

    function changeFontSize(size) {
      editor.updateOptions({ fontSize: parseInt(size) });
    }

    function changeTheme(theme) {
      monaco.editor.setTheme(theme);
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        editor.setValue(content);
        setLanguageByFilename(file.name);
        showStatus(`Đang chỉnh sửa: ${file.name}`);
      };
      reader.readAsText(file);
    }

    function setLanguageByFilename(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const map = {
        js: 'javascript', py: 'python', html: 'html', css: 'css', json: 'json',
        md: 'markdown', java: 'java', c: 'c', cpp: 'cpp', cs: 'csharp',
        ts: 'typescript', php: 'php', go: 'go', sh: 'shell', xml: 'xml',
        yaml: 'yaml', yml: 'yaml', swift: 'swift', rb: 'ruby', rs: 'rust',
        kt: 'kotlin', tex: 'latex'
      };
      const lang = map[ext] || 'plaintext';
      monaco.editor.setModelLanguage(editor.getModel(), lang);
    }

    async function fetchFileFromGitHub() {
      const token = prompt("Nhập GitHub Token:");
      const owner = prompt("Nhập tên người dùng GitHub:");
      const repo = prompt("Nhập tên kho lưu trữ:");
      const branch = prompt("Nhập tên nhánh (ví dụ: main):");
      const filename = prompt("Nhập tên tệp (ví dụ: index.html):");

      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}?ref=${branch}`;

      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (res.ok) {
          const data = await res.json();
          const content = atob(data.content);
          editor.setValue(content);
          setLanguageByFilename(filename);
          showStatus(`Đã tải ${filename} từ GitHub`);
        } else {
          const error = await res.json();
          showStatus(`❌ Lỗi: ${error.message}`, true);
        }
      } catch (error) {
        showStatus(`❌ Lỗi kết nối: ${error.message}`, true);
      }
    }

    async function uploadToGitHub(filename, content) {
      const token = prompt("Nhập GitHub Token:");
      const owner = prompt("Nhập tên người dùng GitHub:");
      const repo = prompt("Nhập tên kho lưu trữ:");
      const branch = prompt("Nhập tên nhánh (ví dụ: main):", "main");

      const encoded = btoa(unescape(encodeURIComponent(content)));
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}`;

      const data = {
        message: `Tải lên ${filename} qua Web`,
        content: encoded,
        branch: branch
      };

      try {
        const res = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify(data)
        });

        const json = await res.json();
        if (res.ok) {
          showStatus(`✔️ Đã tải lên ${filename} lên GitHub`);
        } else {
          showStatus(`❌ Lỗi: ${json.message}`, true);
        }
      } catch (err) {
        showStatus(`❌ Lỗi kết nối: ${err.message}`, true);
      }
    }

    function uploadEditorCode() {
      const content = editor.getValue();
      const filename = prompt("Nhập tên tệp để lưu lên GitHub:");
      if (!filename) return showStatus("Bạn cần nhập tên tệp.", true);
      setLanguageByFilename(filename);
      uploadToGitHub(filename, content);
    }

    function downloadFile() {
      const content = editor.getValue();
      const filename = prompt("Nhập tên tệp để tải xuống:", "code.txt");
      const blob = new Blob([content], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    }

    function previewCode() {
      const content = editor.getValue();
      const model = editor.getModel();
      const language = monaco.editor.getModelLanguage(model);

      document.getElementById("preview").style.display = "block";
      document.getElementById("htmlPreview").style.display = "none";
      document.getElementById("mdPreview").style.display = "none";

      if (language === "html") {
        const iframe = document.getElementById("htmlPreview");
        iframe.style.display = "block";
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(content);
        doc.close();
      } else if (language === "markdown") {
        const mdDiv = document.getElementById("mdPreview");
        mdDiv.innerHTML = marked.parse(content);
        mdDiv.style.display = "block";
      } else {
        showStatus("❌ Chỉ hỗ trợ xem trước HTML và Markdown.", true);
      }
    }

    function showStatus(msg, isError = false) {
      const status = document.getElementById("status");
      status.style.color = isError ? "red" : "lightgreen";
      status.textContent = msg;
    }

    const fontSizeSelect = document.getElementById('fontSizeSelect');
    for (let i = 1; i <= 100; i++) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = i;
      if (i === 14) option.selected = true;
      fontSizeSelect.appendChild(option);
    }
  </script>
</body>
</html>
