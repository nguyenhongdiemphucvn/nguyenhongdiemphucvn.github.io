<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Nguyễn Hồng Diễm Phúc</title>
  <link rel="icon" href="/images/logo.ico" type="image/x-icon">
  <meta name="description" content="Profile Nguyễn Hồng Diễm Phúc - Github">
  <meta name="author" content="Nguyễn Hồng Diễm Phúc">

  <!-- SEO -->
  <meta property="og:title" content="Profile Nguyễn Hồng Diễm Phúc">
  <meta property="og:description" content="Profile Nguyễn Hồng Diễm Phúc - GitHub.">
  <meta property="og:image" content="images/avatar.webp">
  <meta property="og:url" content="https://nguyenhongdiemphucvn.github.io">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Đăng ký Service Worker -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196f3">

  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/gitme-termux.github.io/service-worker.js')
      .then(() => console.log('Service Worker đã được đăng ký'))
      .catch(err => console.error('Đăng ký Service Worker thất bại:', err));
  }
  </script>  
</head>
<body class="bg-gray-900 text-white p-6 font-sans">

<div class="max-w-5xl mx-auto bg-gray-800 p-6 rounded shadow space-y-4">
  <h1 class="text-2xl font-bold text-center">Danh sách Tiện Ích</h1>

  <div class="bg-gray-700 p-4 rounded-lg">
    <h2 class="text-xl font-semibold">Xin mời Bạn chọn!</h2>
    <ul class="list-inside list-disc space-y-2 mt-2">
      <li class="flex justify-between items-center">
        <a href="/public/store.html" class="text-green-400 hover:text-green-500">Kho Script Termux</a>
        <button onclick="copyToClipboard('/public/store.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/code-editor.html" class="text-green-400 hover:text-green-500">Trình soạn mã & Tải lên GitHub</a>
        <button onclick="copyToClipboard('/public/gitme-code-editor.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/create-readme.html" class="text-green-400 hover:text-green-500">Tạo README.md</a>
        <button onclick="copyToClipboard('/public/create-readme.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/zip-tool.html" class="text-green-400 hover:text-green-500">Công cụ ZIP</a>
        <button onclick="copyToClipboard('/public/gitme-zip-tool.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/html-editor-preview.html" class="text-green-400 hover:text-green-500">Trình soạn HTML & Xem trước</a>
        <button onclick="copyToClipboard('/public/html-editor-preview.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/create-access-key.html" class="text-green-400 hover:text-green-500">Tạo Access Key</a>
        <button onclick="copyToClipboard('/public/create-access-key.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/toggle-repository.html" class="text-green-400 hover:text-green-500">Chuyển đổi quyền riêng tư kho lưu trữ</a>
        <button onclick="copyToClipboard('/public/toggle-repository.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
      <li class="flex justify-between items-center">
        <a href="/public/ci-cd-dashboard.html" class="text-green-400 hover:text-green-500">Trạng thái CI/CD</a>
        <button onclick="copyToClipboard('/public/ci-cd-dashboard.html')" class="text-white bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded">Sao chép</button>
      </li>
    </ul>
  </div>
</div>

  <script>
    function copyToClipboard(url) {
      const fullUrl = window.location.origin + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        alert('Đã sao chép URL vào clipboard!');
      }).catch(err => {
        alert('Không thể sao chép URL: ' + err);
      });
    }
  </script>

</body>
</html>
